name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ─── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/crypt-env-mcp.exe
            src-tauri/target/release/crypt-env.exe

  # ─── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/crypt-env-mcp
            src-tauri/target/release/crypt-env

  # ─── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/crypt-env-mcp
            src-tauri/target/release/crypt-env

  # ─── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: dist/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist/linux

      - name: Flatten release assets
        run: |
          mkdir -p release
          # Windows installer + CLI binaries
          find dist/windows -name "*.exe" | xargs -I{} cp {} release/
          # macOS .dmg + CLI binaries (renamed to avoid collision with Linux)
          find dist/macos -name "*.dmg" | xargs -I{} cp {} release/
          find dist/macos -name "crypt-env" -not -name "*.exe" | xargs -I{} cp {} release/crypt-env-macos
          find dist/macos -name "crypt-env-mcp" -not -name "*.exe" | xargs -I{} cp {} release/crypt-env-mcp-macos
          # Linux .deb, .AppImage + CLI binaries
          find dist/linux -name "*.deb" | xargs -I{} cp {} release/
          find dist/linux -name "*.AppImage" | xargs -I{} cp {} release/
          find dist/linux -name "crypt-env" -not -name "*.exe" | xargs -I{} cp {} release/crypt-env-linux
          find dist/linux -name "crypt-env-mcp" -not -name "*.exe" | xargs -I{} cp {} release/crypt-env-mcp-linux
          echo "--- release assets ---"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CryptEnv ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Installation

            ### Windows
            Download the `*-setup.exe` installer and run it.

            ### macOS
            Download the `.dmg`, open it, and drag CryptEnv to Applications.

            ### Linux
            Download the `.deb` package and install with:
            ```
            sudo dpkg -i crypt-env_*_amd64.deb
            ```
            Or use the `.AppImage` — make it executable and run it directly.

            ### CLI and MCP binaries
            | File | Platform |
            |------|----------|
            | `crypt-env.exe` / `crypt-env-mcp.exe` | Windows |
            | `crypt-env-macos` / `crypt-env-mcp-macos` | macOS |
            | `crypt-env-linux` / `crypt-env-mcp-linux` | Linux |

            Copy to a directory on your `PATH`.

            ### MCP Integration (Claude Code / Claude Desktop)
            After copying `crypt-env-mcp` to your PATH, add this to your agent config:
            ```json
            {
              "mcpServers": {
                "crypt-env": {
                  "command": "crypt-env-mcp",
                  "args": []
                }
              }
            }
            ```
            The main CryptEnv app must be running and unlocked. Generate an MCP token in **Settings → Integrations**.
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
