[package]
name = "tauri-crypt-env"
version = "0.2.0"
description = "Secure local secrets manager with AES-256-GCM encryption"
authors = ["maosuarez"]
edition = "2021"
default-run = "tauri-crypt-env"

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "crypt_env_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }

# Tauri plugins
tauri-plugin-opener = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-clipboard-manager = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Database — Plan B: SQLite bundled (no system dep) + AES-GCM app-level encryption
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "macros"] }
libsqlite3-sys = { version = "0.30", features = ["bundled"] }

# Cryptography
argon2 = "0.5"
aes-gcm = "0.10"
rand = "0.8"
zeroize = { version = "1", features = ["derive"] }
subtle = "2"

# HTTP server (local REST API on 127.0.0.1:47821)
axum = "0.7"
tokio = { version = "1", features = ["full"] }

# TLS for the local REST API — auto-generated self-signed cert via rcgen
rcgen = "0.13"
axum-server = { version = "0.7", features = ["tls-rustls"] }
rustls = { version = "0.23", features = ["ring"] }
tokio-rustls = "0.26"
time = { version = "0.3", features = ["std"] }
pem = "3"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }

# Secret sharing — LAN bridge + encrypted packages
x25519-dalek = { version = "2", features = ["static_secrets", "reusable_secrets"] }
mdns-sd = "0.11"
sha2 = "0.10"
hkdf = "0.12"

# CLI
clap = { version = "4", features = ["derive"] }
rpassword = "7"
comfy-table = "7"
regex = "1"
dialoguer = "0.11"
dotenvy = "0.15"
shell-escape = "0.1"
shlex = "1"

# Native file dialogs for share export/import
rfd = "0.14"

# HTTP client — only for the crypt-env CLI binary
# rustls-tls-native-roots: use the OS trust store PLUS our custom cert addition
reqwest = { version = "0.12", features = ["blocking", "json", "rustls-tls-native-roots"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = [
    "Security_Credentials_UI",
    "Win32_Security_Cryptography",
    "Win32_Foundation",
    "Win32_System_Memory",
] }

[[bin]]
name = "crypt-env"
path = "src/bin/crypt-env/main.rs"

[[bin]]
name = "crypt-env-mcp"
path = "src/bin/crypt-env-mcp.rs"
